name: Deploy to GCP
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          script_stop: true
          command_timeout: 15m
          script: |
            cd /var/www/zoikomeds
            git fetch origin main
            git reset --hard origin/main
            npm install
            npm run build
            pm2 restart zoikomeds
